<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impacto & Co. | Agencia de Eventos y Marketing</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --primary: #6366f1;
      --secondary: #f43f5e;
      --dark: #0f172a;
      --light: #f8fafc;
      --gray: #64748b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--light);
      color: var(--dark);
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 10%;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--primary);
    }

    .nav-links a {
      margin-left: 2rem;
      text-decoration: none;
      color: var(--dark);
      font-weight: 500;
      transition: color 0.3s;
    }

    .nav-links a:hover {
      color: var(--primary);
    }

    .hero {
      padding: 8rem 10% 6rem 10%;
      text-align: center;
      background: linear-gradient(135deg, #e0e7ff 0%, #fce7f3 100%);
    }

    .hero h1 {
      font-size: 3.5rem;
      margin-bottom: 1.5rem;
      color: var(--dark);
      line-height: 1.2;
    }

    .hero p {
      font-size: 1.25rem;
      color: var(--gray);
      max-width: 600px;
      margin: 0 auto 2rem auto;
    }

    .btn {
      padding: 0.8rem 2rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s, background 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      background: #4f46e5;
    }

    section {
      padding: 5rem 10%;
    }

    section h2 {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 3rem;
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 2rem;
    }

    .service-card {
      background: white;
      padding: 2.5rem;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      text-align: center;
      transition: transform 0.3s;
    }

    .service-card:hover {
      transform: translateY(-5px);
    }

    .service-card h3 {
      margin: 1rem 0;
    }

    .service-card svg {
      margin: 0 auto;
    }

    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
    }

    .portfolio-item {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

    .portfolio-info {
      padding: 1.5rem;
    }

    .contact-form {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .contact-form input, .contact-form textarea {
      padding: 1rem;
      border: 1px solid #cbd5e1;
      border-radius: 5px;
      font-size: 1rem;
    }

    footer {
      background: var(--dark);
      color: white;
      text-align: center;
      padding: 2rem;
      margin-top: 4rem;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    function App() {
      const [formData, setFormData] = React.useState({ name: '', email: '', message: '' });

      const handleSubmit = (e) => {
        e.preventDefault();
        alert(`¡Gracias ${formData.name}! Nos pondremos en contacto contigo pronto.`);
        setFormData({ name: '', email: '', message: '' });
      };

      return (
        <div>
          {/* NAVBAR */}
          <nav className="navbar">
            <div className="logo">Impacto & Co.</div>
            <div className="nav-links">
              <a href="#inicio">Inicio</a>
              <a href="#servicios">Servicios</a>
              <a href="#portafolio">Portafolio</a>
              <a href="#contacto">Contacto</a>
            </div>
          </nav>

          {/* HERO SECTION */}
          <header id="inicio" className="hero">
            <h1>Creamos Experiencias Inolvidables e Impulsamos tu Marca</h1>
            <p>Somos expertos en organización de eventos corporativos y estrategias de marketing digital que hacen ruido.</p>
            <a href="#contacto"><button className="btn">Cotiza tu Proyecto</button></a>
          </header>

          {/* SERVICIOS */}
          <section id="servicios">
            <h2>Nuestros Servicios</h2>
            <div className="services-grid">
              <div className="service-card">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#6366f1" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                <h3>Eventos Corporativos</h3>
                <p>Conferencias, lanzamientos de producto y fiestas de fin de año con logística impecable.</p>
              </div>
              <div className="service-card">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#6366f1" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 8-9.04 9.06a2.1 2.1 0 1 0 2.98 2.98L15 11"/><path d="M17 2h5v5"/><path d="m22 2-7 7"/><path d="M8 11v-4h4"/></svg>
                <h3>Marketing Digital</h3>
                <p>Estrategias de redes sociales, pauta digital y posicionamiento para que tu marca destaque.</p>
              </div>
              <div className="service-card">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#6366f1" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <h3>BTL & Experiencias</h3>
                <p>Activaciones de marca creativas que conectan de verdad con tus clientes potenciales.</p>
              </div>
            </div>
          </section>

          {/* PORTAFOLIO */}
          <section id="portafolio" style={{ backgroundColor: '#f1f5f9' }}>
            <h2>Casos de Éxito</h2>
            <div className="portfolio-grid">
              <div className="portfolio-item">
                <div className="portfolio-info">
                  <h3>Tech Summit 2026</h3>
                  <p>Logística completa y convocatoria para más de 1,500 asistentes presenciales.</p>
                </div>
              </div>
              <div className="portfolio-item">
                <div className="portfolio-info">
                  <h3>Campaña "EcoModa"</h3>
                  <p>Estrategia digital que incrementó las ventas online de nuestro cliente en un 140%.</p>
                </div>
              </div>
            </div>
          </section>

          {/* CONTACTO */}
          <section id="contacto">
            <h2>Hablemos de tu Próximo Proyecto</h2>
            <form className="contact-form" onSubmit={handleSubmit}>
              <input 
                type="text" 
                placeholder="Tu Nombre" 
                required 
                value={formData.name}
                onChange={(e) => setFormData({...formData, name: e.target.value})}
              />
              <input 
                type="email" 
                placeholder="Tu Correo" 
                required 
                value={formData.email}
                onChange={(e) => setFormData({...formData, email: e.target.value})}
              />
              <textarea 
                placeholder="Cuéntanos sobre tu evento o proyecto de marketing" 
                rows="5" 
                required
                value={formData.message}
                onChange={(e) => setFormData({...formData, message: e.target.value})}
              ></textarea>
              <button type="submit" className="btn">Enviar Mensaje</button>
            </form>
          </section>

          {/* FOOTER */}
          <footer>
            <p>© 2026 Impacto & Co. Todos los derechos reservados.</p>
          </footer>
        </div>
      );
    }

    // Renderizar de forma limpia con React 18
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
